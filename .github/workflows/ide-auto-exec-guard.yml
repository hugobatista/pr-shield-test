name: 🛡️ IDE Auto-Execution Guard

on:
  pull_request:
    paths:
      # Root-level guarded directories (with and without trailing /** to catch symlink replacements)
      - '.vscode'
      - '.vscode/**'
      - '.claude'
      - '.claude/**'
      - '.idea'
      - '.idea/**'
      - '.cursor'
      - '.cursor/**'
      - '.codeium'
      - '.codeium/**'
      - '.continue'
      - '.continue/**'
      - '.windsurf'
      - '.windsurf/**'
      - '.github'
      - '.github/**'
      - '.devcontainer'
      - '.devcontainer/**'
      # Subdirectory guarded directories
      - '**/.vscode'
      - '**/.vscode/**'
      - '**/.github'
      - '**/.github/**'
      - '**/.claude'
      - '**/.claude/**'
      - '**/.idea'
      - '**/.idea/**'
      - '**/.cursor'
      - '**/.cursor/**'
      - '**/.codeium'
      - '**/.codeium/**'
      - '**/.continue'
      - '**/.continue/**'
      - '**/.windsurf'
      - '**/.windsurf/**'
      - '**/.devcontainer'
      - '**/.devcontainer/**'

  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Branch to diff against (only used for manual workflow_dispatch runs; ignored on pull_request triggers)'
        required: false

permissions:
  pull-requests: write
  contents: read

jobs:
  ide-config-security:
    name: IDE Auto-Execution Guard
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.base_ref || github.event.inputs.base_ref || 'main' }}
      # Shared directory patterns used across multiple scan steps (keeps them in sync)
      CASE_GLOB: '.vscode|*/.vscode|.vscode/*|*/.vscode/*|.claude|*/.claude|.claude/*|*/.claude/*|.idea|*/.idea|.idea/*|*/.idea/*|.cursor|*/.cursor|.cursor/*|*/.cursor/*|.codeium|*/.codeium|.codeium/*|*/.codeium/*|.continue|*/.continue|.continue/*|*/.continue/*|.windsurf|*/.windsurf|.windsurf/*|*/.windsurf/*|.github|*/.github|.github/*|*/.github/*|.devcontainer|*/.devcontainer|.devcontainer/*|*/.devcontainer/*'
      GREP_DIRS: '\.vscode|\.claude|\.idea|\.cursor|\.codeium|\.continue|\.windsurf|\.devcontainer'

    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate base branch reference
        run: |
          if ! echo "$BASE_REF" | grep -qE '^[a-zA-Z0-9_/.-]+$'; then
            echo "::error::Invalid base branch reference: '$BASE_REF'. Branch names may only contain alphanumeric characters, underscores, hyphens, dots, and forward slashes."
            exit 1
          fi
          echo "✓ BASE_REF validated: $BASE_REF"
          echo "DIFF_BASE=origin/$BASE_REF...HEAD" >> "$GITHUB_ENV"
          echo "LOG_RANGE=origin/$BASE_REF..HEAD" >> "$GITHUB_ENV"

      - name: Fetch base branch
        run: |
          git fetch origin "$BASE_REF"

      # ---------------------------------------------------------------
      # 1. Detect IDE / AI-agent config directories being added/modified
      # ---------------------------------------------------------------
      - name: Detect IDE config changes
        id: ide_dirs
        run: |
          DIRS=".vscode .claude .idea .cursor .codeium .continue .windsurf .devcontainer"
          FOUND=""
          for dir in $DIRS; do
            # Escape dots so .vscode isn't treated as "any char + vscode" in the regex
            escaped_dir="${dir//./\\.}"
            # Match both dir/contents and bare dir name (catches symlink-directory-replacement attacks)
            if git diff --name-only -z "$DIFF_BASE" | grep -z -qE "^(.*/)?${escaped_dir}(/|$)"; then
              FOUND="$FOUND $dir"
              # Check if the directory entry itself is a symlink (not a real directory)
              if git diff --name-only -z "$DIFF_BASE" | grep -z -qE "^(.*/)?${escaped_dir}$"; then
                echo "⚠️  ${dir} is a FILE/SYMLINK, not a directory — possible symlink replacement attack"
              fi
            fi
          done
          # Also flag any .github/ directory changes (workflows, agents, skills, copilot instructions, etc.)
          GITHUB_FILES=$(git diff --name-only -z "$DIFF_BASE" | grep -z -E '^(.*/)?\.github/' | tr '\0' ' ')
          if [ -n "$GITHUB_FILES" ]; then
            FOUND="$FOUND .github/"
            echo "📂 .github/ files changed: $GITHUB_FILES"
          fi
          echo "found=$FOUND" >> "$GITHUB_OUTPUT"
          if [ -n "$FOUND" ]; then
            echo "⚠️  IDE/Agent config directories changed:$FOUND"
          else
            echo "✅ No IDE/agent config directories changed."
          fi

      # ---------------------------------------------------------------
      # 2. Scan for runOn: folderOpen (VS Code auto-task execution)
      # ---------------------------------------------------------------
      - name: Scan for runOn folderOpen
        id: run_on
        run: |
          MATCHES=""
          while IFS= read -r -d '' file; do
            if [ -f "$file" ]; then
              if grep -Pn '"runOn"\s*:\s*"folderOpen"' "$file" 2>/dev/null; then
                MATCHES="${MATCHES}"$'\n'"${file}"
              fi
            fi
          done < <(git diff --name-only -z "$DIFF_BASE" | grep -z -E '^(.*/)?(${{ env.GREP_DIRS }})/.*\.json$')

          if [ -n "$MATCHES" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            MATCHES_ENCODED=$(printf "%s" "$MATCHES" | base64 -w0)
            echo "matches_encoded=$MATCHES_ENCODED" >> "$GITHUB_OUTPUT"
            printf "🚨 runOn:folderOpen detected in:\n%s\n" "$MATCHES"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "matches_encoded=" >> "$GITHUB_OUTPUT"
            echo "✅ No runOn:folderOpen found."
          fi

      # ---------------------------------------------------------------
      # 3. Scan for AI-agent hook types (SessionStart, PreToolUse,
      #    PostToolUse, SessionBreak, or any "hooks" block)
      # ---------------------------------------------------------------
      - name: Scan for AI agent hook types
        id: session_start
        run: |
          MATCHES=""
          HOOK_PATTERNS=(
            'SessionStart'
            'PreToolUse'
            'PostToolUse'
            'SessionBreak'
            '"hooks"'
          )
          while IFS= read -r -d '' file; do
            if [ -f "$file" ]; then
              for pattern in "${HOOK_PATTERNS[@]}"; do
                if grep -Pn "$pattern" "$file" 2>/dev/null; then
                  MATCHES="${MATCHES}"$'\n'"${file} (${pattern})"
                  break
                fi
              done
            fi
          done < <(git diff --name-only -z "$DIFF_BASE" | grep -z -E '^(.*/)?(${{ env.GREP_DIRS }})/.*\.json$')

          if [ -n "$MATCHES" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            MATCHES_ENCODED=$(printf "%s" "$MATCHES" | base64 -w0)
            echo "matches_encoded=$MATCHES_ENCODED" >> "$GITHUB_OUTPUT"
            printf "🚨 AI agent hook(s) detected in:\n%s\n" "$MATCHES"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "matches_encoded=" >> "$GITHUB_OUTPUT"
            echo "✅ No AI agent hooks found."
          fi

      # ---------------------------------------------------------------
      # 4. Scan for external download / exec patterns (curl, wget, etc.)
      # ---------------------------------------------------------------
      - name: Scan for external download/exec patterns
        id: exec_patterns
        run: |
          MATCHES=""
          PATTERNS=(
            # -- External download commands (require space after to avoid partial matches)
            'curl\s+'
            'wget\s+'
            # -- fetch as a command/API call, not as a word (avoids false positives like "fetch-depth")
            '\bfetch[\s\(]'
            # -- Command execution patterns
            '\bexec\b'
            '\bspawn\b'
            '\beval\b'
            # -- File permission changes
            '\bchmod\b'
            # -- Obfuscation: base64 decode (Linux -d/--decode, macOS -D), openssl base64, hex encoding, command substitution
            'base64\s*(-d|--decode|-D)'
            'openssl\s+base64'
            '\$\(.*\)'
            # -- Cross-platform shell execution
            'powershell'
            'cmd\.exe'
            # -- Inline code execution
            'python\s+-c'
            'node\s+-e'
            'bun\s+run'
            '\\\\x[0-9a-fA-F]{2}'
          )

          # Use NUL-delimited git diff to handle filenames with spaces safely
          while IFS= read -r -d '' file; do
            case "$file" in
              ${{ env.CASE_GLOB }})
                # Check for symlinks pointing outside the repository (path traversal)
                if [ -L "$file" ]; then
                  target="$(readlink -f "$file" 2>/dev/null || echo '')"
                  repo_root="$(pwd)"
                  if [ -n "$target" ]; then
                    case "$target" in
                      "$repo_root"/*) ;;  # within repo — allowed
                      *)
                        MATCHES="${MATCHES}"$'\n\n'"${file}] ⚠️ symlink target OUTSIDE repository → ${target}"
                        ;;
                    esac
                  else
                    # Dangling symlink — target doesn't exist
                    MATCHES="${MATCHES}"$'\n\n'"${file}] ⚠️ dangling symlink"
                  fi
                fi
                if [ -f "$file" ]; then
                  for pattern in "${PATTERNS[@]}"; do
                    result=$(grep -Pn "$pattern" "$file" 2>/dev/null | head -5)
                    if [ -n "$result" ]; then
                      MATCHES="${MATCHES}"$'\n\n'"${file}] matches '${pattern}':"$'\n'"${result}"
                    fi
                  done
                fi
                ;;
            esac
          done < <(git diff --name-only -z "$DIFF_BASE")

          if [ -n "$MATCHES" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            MATCHES_ENCODED=$(printf "%s" "$MATCHES" | base64 -w0)
            echo "matches_encoded=$MATCHES_ENCODED" >> "$GITHUB_OUTPUT"
            printf "🚨 Suspicious exec/download patterns found:\n%s\n" "$MATCHES"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "matches_encoded=" >> "$GITHUB_OUTPUT"
            echo "✅ No suspicious exec/download patterns found."
          fi

      # ---------------------------------------------------------------
      # 4b. Advisory URL scan (separate from critical exec patterns
      #     to avoid false-positive firehose from legitimate URLs)
      # ---------------------------------------------------------------
      - name: Scan for external URLs in config files (advisory)
        id: url_scan
        run: |
          MATCHES=""
          while IFS= read -r -d '' file; do
            case "$file" in
              ${{ env.CASE_GLOB }})
                if [ -f "$file" ]; then
                  result=$(grep -Pn 'https?://' "$file" 2>/dev/null | head -10)
                  if [ -n "$result" ]; then
                    MATCHES="${MATCHES}"$'\n\n'"${file}]:${result}"
                  fi
                fi
                ;;
            esac
          done < <(git diff --name-only -z "$DIFF_BASE")

          if [ -n "$MATCHES" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            MATCHES_ENCODED=$(printf "%s" "$MATCHES" | base64 -w0)
            echo "matches_encoded=$MATCHES_ENCODED" >> "$GITHUB_OUTPUT"
            printf "ℹ️  External URLs found (advisory):\n%s\n" "$MATCHES"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "matches_encoded=" >> "$GITHUB_OUTPUT"
            echo "✅ No external URLs found."
          fi

      # ---------------------------------------------------------------
      # 5. Verify commit author identity on IDE config file commits
      # ---------------------------------------------------------------
      - name: Check commit author identity
        id: author_check
        run: |
          SUSPICIOUS=""
          KNOWN_BOT_PATTERNS=("dependabot" "renovate" "github-actions" "pre-commit-ci")

          # Get commits that touch IDE config dirs in this PR
          # Use tab separators so multi-word author names (e.g. "João Silva") are captured correctly
          COMMITS=$(git log "$LOG_RANGE" --format="%H%x09%ae%x09%an" -- \
            '.vscode/' '.claude/' '.idea/' '.cursor/' '.codeium/' '.continue/' '.windsurf/' '.github/' '.devcontainer/' 2>/dev/null)

          while IFS=$'\t' read -r hash email name; do
            [ -z "$hash" ] && continue
            TRUSTED=false
            for bot in "${KNOWN_BOT_PATTERNS[@]}"; do
              if echo "$email $name" | grep -qi "$bot"; then
                TRUSTED=true
                break
              fi
            done
            # Flag emails that look spoofed (noreply-style, empty, or generic)
            if ! $TRUSTED; then
              # Skip GitHub's own privacy noreply addresses — these are legitimate
              if echo "$email" | grep -qiE '@users\.noreply\.github\.com$'; then
                continue
              fi
              if echo "$email" | grep -qiE '^$|noreply|no-reply|git@|unknown'; then
                SUSPICIOUS="$SUSPICIOUS\n  ⚠️  Commit $hash by '$name' <$email> — verify identity"
              fi
            fi
          done <<< "$COMMITS"

          if [ -n "$SUSPICIOUS" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            printf "⚠️  Suspicious commit authors on IDE config changes:$SUSPICIOUS\n"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "✅ Commit authors look normal."
          fi

      # ---------------------------------------------------------------
      # 6. Post a consolidated PR comment
      # ---------------------------------------------------------------
      - name: Post PR security comment
        # Skip on workflow_dispatch (no PR context) and forked PRs (read-only token)
        if: |
          always() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.fork != true
        uses: actions/github-script@v9
        with:
          script: |
            // Helper to decode base64 step outputs
            function decodeOutput(encoded) {
              if (!encoded || encoded === '') return '';
              try { return Buffer.from(encoded, 'base64').toString('utf-8'); } catch { return '(unable to decode)'; }
            }

            const ideDirs      = '${{ steps.ide_dirs.outputs.found }}';
            const runOn        = '${{ steps.run_on.outputs.found }}';
            const sessionStart = '${{ steps.session_start.outputs.found }}';
            const execPat      = '${{ steps.exec_patterns.outputs.found }}';
            const urlsFound    = '${{ steps.url_scan.outputs.found }}';
            const authorCheck  = '${{ steps.author_check.outputs.found }}';

            const runOnMatches       = decodeOutput('${{ steps.run_on.outputs.matches_encoded }}');
            const sessionStartMatches = decodeOutput('${{ steps.session_start.outputs.matches_encoded }}');
            const execPatMatches     = decodeOutput('${{ steps.exec_patterns.outputs.matches_encoded }}');
            const urlsMatches        = decodeOutput('${{ steps.url_scan.outputs.matches_encoded }}');

            const critical = runOn === 'true' || sessionStart === 'true' || execPat === 'true';
            const warning  = ideDirs.trim() !== '' || authorCheck === 'true' || urlsFound === 'true';

            if (!critical && !warning) {
              console.log('No IDE auto-exec security issues found. Skipping comment.');
              return;
            }

            let body = `## 🛡️ IDE auto-exec security Check\n\n`;

            if (critical) {
              body += `> ⛔ **CRITICAL findings** — this PR must be reviewed by a maintainer before merging.\n\n`;
            } else {
              body += `> ⚠️ **Advisory** — IDE/agent config files were modified. Please review the items below.\n\n`;
            }

            if (runOn === 'true') {
              body += `### 🚨 \`runOn: "folderOpen"\` detected\n`;
              body += `A \`.vscode/tasks.json\` in this PR contains \`runOn: "folderOpen"\`, which causes VS Code to **automatically execute code** when any developer opens this workspace.\n`;
              body += `This is the primary persistence mechanism used by the [Mini Shai-Hulud supply chain worm](https://www.aikido.dev/blog/mini-shai-hulud-is-back-tanstack-compromised).\n\n`;
              body += `**Required action:** Remove or justify the \`runOn: "folderOpen"\` entry before merge.\n\n`;
              body += `\`\`\`\n${runOnMatches}\n\`\`\`\n\n`;
            }

            if (sessionStart === 'true') {
              body += `### 🚨 AI agent hook detected (\`SessionStart\`, \`PreToolUse\`, \`PostToolUse\`, etc.)\n`;
              body += `A config file contains a \`hooks\` block or specific hook reference. Claude Code and other AI agents execute these automatically at session startup or before/after tool use.\n`;
              body += `This was used in recent supply chain attacks to re-execute malware whenever an AI coding session begins.\n\n`;
              body += `**Required action:** Verify every hook is intentional and safe before merge.\n\n`;
              body += `\`\`\`\n${sessionStartMatches}\n\`\`\`\n\n`;
            }

            if (execPat === 'true') {
              body += `### 🚨 External download / exec patterns in IDE config, .devcontainer/, or .github/ files\n`;
              body += `One or more changed IDE/agent config, \`.devcontainer/\`, or \`.github/\` files contain patterns like \`curl\`, \`wget\`, \`eval\`, \`exec\`, or obfuscated code.\n`;
              body += `These patterns in IDE/agent configs and devcontainer configs are high-risk and may execute automatically when the workspace is opened. Patterns in \`.github/\` files (workflows, agent instructions) may exfiltrate secrets or run arbitrary code.\n\n`;
              body += `**Required action:** Review all flagged files carefully.\n\n`;
              body += `\`\`\`\n${execPatMatches}\n\`\`\`\n\n`;
            }

            if (urlsFound === 'true') {
              body += `### ℹ️ External URLs detected in config files\n`;
              body += `One or more changed files contain \`https://\` or \`http://\` URLs.\n`;
              body += `This is **advisory** — most IDE configs legitimately contain marketplace, schema, or documentation URLs.\n`;
              body += `However, verify no URL points to an unexpected or untrusted host.\n\n`;
              body += `\`\`\`\n${urlsMatches}\n\`\`\`\n\n`;
            }

            if (ideDirs.trim() !== '') {
              body += `### ⚠️ IDE / AI-agent config directories, .devcontainer/, or .github/ modified\n`;
              body += `Changed: \`${ideDirs.trim()}\`\n\n`;
              body += `These directories control how IDEs, AI agents, GitHub Actions, and dev containers behave in this workspace. Changes should be intentional and reviewed by at least one maintainer.\n\n`;
            }

            if (authorCheck === 'true') {
              body += `### ⚠️ Suspicious commit author on IDE config changes\n`;
              body += `A commit touching IDE config files has an unrecognised or suspicious author email. This was used in Mini Shai-Hulud attacks to disguise malicious commits as routine dependency updates.\n\n`;
              body += `**Required action:** Verify the author's identity and the content of the commit.\n\n`;
            }

            body += `---\n`;
            body += `<details><summary>ℹ️ Why these checks exist</summary>\n\n`;
            body += `The [Mini Shai-Hulud npm worm](https://www.aikido.dev/blog/mini-shai-hulud-is-back-tanstack-compromised) (active April–May 2026) compromises developer machines by committing malicious IDE config files to repos under a spoofed identity. When a developer opens the repo, VS Code auto-runs the payload via \`runOn: "folderOpen"\` tasks, or AI agents re-execute it via \`SessionStart\` hooks.\n\n`;
            body += `This check was added as a defensive measure. See the [Endor Labs writeup](https://www.endorlabs.com/learn/mini-shai-hulud-npm-worm-hits-sap-developer-packages) for details.\n`;
            body += `</details>\n`;

            // Find and update existing comment, or create new one
            const marker = '## 🛡️ IDE auto-exec security Check';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      # ---------------------------------------------------------------
      # 7. Fail the check if critical findings exist
      # ---------------------------------------------------------------
      - name: Fail on critical findings
        if: |
          steps.run_on.outputs.found == 'true' ||
          steps.session_start.outputs.found == 'true' ||
          steps.exec_patterns.outputs.found == 'true'
        run: |
          echo "::error::🚨 Critical IDE auto-exec security findings detected. Review the PR comment for details."
          exit 1
